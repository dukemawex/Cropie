name: Tests

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agrosentinel-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: agrosentinel-backend/package.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
